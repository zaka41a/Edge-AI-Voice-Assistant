services:
  db:
    image: postgres:16
    container_name: edgeai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: edgeai
      POSTGRES_PASSWORD: edgeai
      POSTGRES_DB: edgeai
    ports:
      # Host port 5544 to avoid clashing with other local Postgres instances
      - "5544:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Auto-create the schema on first initialization
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edgeai -d edgeai"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
